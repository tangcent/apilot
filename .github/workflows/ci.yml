name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.check-labels.outputs.should-skip }}
    steps:
      - id: check-labels
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const docLabel = labels.data.find(label => label.name === 'type: doc');
            if (docLabel) {
              core.setOutput('should-skip', 'true');
            } else {
              core.setOutput('should-skip', 'false');
            }

  build-test:
    needs: check-skip
    if: ${{ github.event_name != 'pull_request' || needs.check-skip.outputs.should-skip != 'true' }}
    name: "Test on ${{ matrix.os }} / Go ${{ matrix.go-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        go-version: [ "1.22", "1.23" ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Test all modules
        shell: bash
        run: |
          for mod in api-collector api-formatter api-collector-go api-collector-java api-collector-node api-collector-python api-formatter-curl api-formatter-markdown api-formatter-postman api-master apilot-cli; do
            if [ -f "$mod/go.mod" ]; then
              echo "==> Testing $mod"
              (cd "$mod" && go test ./... && go vet ./...)
            fi
          done

      - name: Build apilot-cli
        run: go build -o /dev/null ./apilot-cli
        if: runner.os != 'Windows'

      - name: Build apilot-cli (Windows)
        run: go build -o NUL ./apilot-cli
        if: runner.os == 'Windows'
