name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.check-labels.outputs.should-skip }}
    steps:
      - id: check-labels
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const docLabel = labels.data.find(label => label.name === 'type: doc');
            if (docLabel) {
              core.setOutput('should-skip', 'true');
            } else {
              core.setOutput('should-skip', 'false');
            }

  integration-test:
    needs: check-skip
    if: ${{ github.event_name != 'pull_request' || needs.check-skip.outputs.should-skip != 'true' }}
    name: "Integration Tests on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build apilot-cli
        run: go build -o apilot ./apilot-cli
        if: runner.os != 'Windows'

      - name: Build apilot-cli (Windows)
        run: go build -o apilot.exe ./apilot-cli
        if: runner.os == 'Windows'

      - name: Run integration tests
        shell: bash
        run: |
          # Make apilot accessible in PATH
          if [ "$RUNNER_OS" = "Windows" ]; then
            export PATH="$PWD:$PATH"
          else
            chmod +x apilot
            sudo mv apilot /usr/local/bin/
          fi
          
          # Run integration tests
          cd samples
          bash run_all_tests.sh
