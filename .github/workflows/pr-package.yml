name: PR Build and Comment

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  build-and-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check for issue number
        id: check_issue
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          printf '%s' "$PR_BODY" > pr_body.txt
          CURRENT_REPO_ISSUE_URL_REGEX="https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/[0-9]+"
          if grep -qoE "$CURRENT_REPO_ISSUE_URL_REGEX" pr_body.txt; then
            ISSUE_NUM=$(grep -oE "$CURRENT_REPO_ISSUE_URL_REGEX" pr_body.txt | head -n 1 | grep -oE "[0-9]+$")
            echo "issue_number=${ISSUE_NUM}" >> $GITHUB_OUTPUT
            echo "has_issue=true" >> $GITHUB_OUTPUT
          else
            sed -E 's/\[[^][]*\]\([^()]*\)//g; s/\[[^][]*\]//g; s@[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+#[0-9]+@@g' pr_body.txt > pr_body_clean.txt
            if grep -qoE "#[0-9]+" pr_body_clean.txt; then
              ISSUE_NUM=$(grep -oE "#[0-9]+" pr_body_clean.txt | head -n 1 | tr -d '#')
              echo "issue_number=${ISSUE_NUM}" >> $GITHUB_OUTPUT
              echo "has_issue=true" >> $GITHUB_OUTPUT
            else
              echo "has_issue=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Build apilot-cli (linux/amd64)
        run: |
          mkdir -p bin
          GOOS=linux GOARCH=amd64 go build -o bin/apilot-linux-amd64 ./apilot-cli

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: apilot-linux-amd64-pr${{ github.event.pull_request.number }}
          path: bin/apilot-linux-amd64
          if-no-files-found: error

      - name: Comment on target issue
        if: steps.check_issue.outputs.has_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const issueNumber = '${{ steps.check_issue.outputs.issue_number }}';
            const workflowRunUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `A PR (#${pr.number}) has been opened to fix this issue. A test build is available in the [GitHub Actions workflow run](${workflowRunUrl}) under Artifacts.`
            });

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const workflowRunUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `📦 Build artifact for this PR is available in the [GitHub Actions workflow run](${workflowRunUrl}) under Artifacts.`
            });
