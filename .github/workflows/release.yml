name: 'CLI Release'

on:
  push:
    branches:
      - main

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: contains(github.event.head_commit.message, 'release: cli')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: extract_version
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          VERSION=$(echo "$COMMIT_MSG" | head -1 | grep -oE 'v?[0-9]+\.[0-9]+\.[0-9]+' | sed 's/^v//')

          if [ -z "$VERSION" ]; then
            if [ -f "package.json" ]; then
              VERSION=$(node -p "require('./package.json').version")
              if [ -z "$VERSION" ]; then
                echo "Error: No version found in package.json"
                exit 1
              fi
            else
              echo "Error: package.json file not found"
              exit 1
            fi
          fi

          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v$VERSION"
          fi

          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG_NAME="${{ steps.extract_version.outputs.version }}"
          if git tag -l "${TAG_NAME}" | grep -q "${TAG_NAME}"; then
            echo "Tag ${TAG_NAME} already exists. Skipping release creation."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Tag ${TAG_NAME} does not exist. Proceeding with release creation."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Create tag
        if: steps.check_tag.outputs.skip == 'false'
        run: |
          git tag ${{ steps.check_tag.outputs.tag_name }}

      - name: Set up Go
        if: steps.check_tag.outputs.skip == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run GoReleaser
        if: steps.check_tag.outputs.skip == 'false'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Release Notes
        if: steps.check_tag.outputs.skip == 'false'
        id: generate_notes
        run: |
          PREV_TAG=$(git tag -l "v*.*.*" | sort -V | tail -n2 | head -n1)
          CURRENT_TAG=${{ steps.check_tag.outputs.tag_name }}

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
            NOTES="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}\n\n"
            COMMITS=$(git log --pretty=format:"* %s" $PREV_TAG..HEAD | grep -E '^\* (refactor|feat|fix|perf|docs)' || true)
          else
            NOTES="**Initial Release**\n\n"
            COMMITS=$(git log --pretty=format:"* %s" | grep -E '^\* (refactor|feat|fix|perf|docs)' || true)
          fi

          if [ -n "$COMMITS" ]; then
            NOTES="${NOTES}### Changes\n${COMMITS}\n\n"
          fi

          NOTES="${NOTES}---\n\n"
          NOTES="${NOTES}### Downloads\n\n"
          NOTES="${NOTES}| Platform | Architecture |\n"
          NOTES="${NOTES}| -------- | ------------ |\n"
          DOWNLOAD_VERSION=$(echo "$CURRENT_TAG" | sed 's/^v//')
          NOTES="${NOTES}| [apilot-${DOWNLOAD_VERSION}-darwin-amd64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${CURRENT_TAG}/apilot-${DOWNLOAD_VERSION}-darwin-amd64.tar.gz) | macOS Intel |\n"
          NOTES="${NOTES}| [apilot-${DOWNLOAD_VERSION}-darwin-arm64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${CURRENT_TAG}/apilot-${DOWNLOAD_VERSION}-darwin-arm64.tar.gz) | macOS Apple Silicon |\n"
          NOTES="${NOTES}| [apilot-${DOWNLOAD_VERSION}-linux-amd64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${CURRENT_TAG}/apilot-${DOWNLOAD_VERSION}-linux-amd64.tar.gz) | Linux x64 |\n"
          NOTES="${NOTES}| [apilot-${DOWNLOAD_VERSION}-linux-arm64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${CURRENT_TAG}/apilot-${DOWNLOAD_VERSION}-linux-arm64.tar.gz) | Linux ARM64 |\n"
          NOTES="${NOTES}| [apilot-${DOWNLOAD_VERSION}-windows-amd64.zip](https://github.com/${{ github.repository }}/releases/download/${CURRENT_TAG}/apilot-${DOWNLOAD_VERSION}-windows-amd64.zip) | Windows x64 |\n"
          NOTES="${NOTES}| [apilot-${DOWNLOAD_VERSION}-windows-arm64.zip](https://github.com/${{ github.repository }}/releases/download/${CURRENT_TAG}/apilot-${DOWNLOAD_VERSION}-windows-arm64.zip) | Windows ARM64 |\n"

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update Release
        uses: softprops/action-gh-release@v1
        if: steps.check_tag.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.check_tag.outputs.tag_name }}
          name: ${{ steps.check_tag.outputs.tag_name }}
          body: ${{ steps.generate_notes.outputs.notes }}
          draft: true
          prerelease: true

  npm-publish:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version
        id: version
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          VERSION=$(echo "$COMMIT_MSG" | head -1 | grep -oE 'v?[0-9]+\.[0-9]+\.[0-9]+' | sed 's/^v//')
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
