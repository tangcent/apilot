# This file is kept for local `goreleaser build --snapshot` usage only.
# CI releases are handled by .github/workflows/release.yml using go build directly.
version: 2

builds:
  - binary: apilot
    main: ./apilot-cli
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X github.com/tangcent/apilot/apilot-cli/build.Version={{ .Version }} -X github.com/tangcent/apilot/apilot-cli/build.Date={{ .Date }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
